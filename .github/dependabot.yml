# ============================================================
# Dependabot Configuration
#
# This is the ONLY repository that needs Dependabot for shared
# dependency updates. Child modules only need to bump the parent
# version to pick up all dependency changes.
# ============================================================
version: 2

updates:

  # ── Maven dependencies ────────────────────────────────────
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    rebase-strategy: auto
    open-pull-requests-limit: 15
    labels:
      - dependencies
      - java
    commit-message:
      prefix: "deps"
      include: "scope"

    groups:
      kafka:
        applies-to: version-updates
        patterns:
          - "org.apache.kafka:*"
          - "io.confluent:*"
      testcontainers:
        applies-to: version-updates
        patterns:
          - "org.testcontainers:*"
      junit5:
        applies-to: version-updates
        patterns:
          - "org.junit.jupiter:*"
          - "org.junit.platform:*"
      cucumber:
        applies-to: version-updates
        patterns:
          - "io.cucumber:*"
      mockito:
        applies-to: version-updates
        patterns:
          - "org.mockito:*"
      commons:
        applies-to: version-updates
        patterns:
          - "org.apache.commons:*"
          - "commons-*:*"
      logging:
        applies-to: version-updates
        patterns:
          - "org.slf4j:*"
          - "ch.qos.logback:*"
          - "org.apache.logging.log4j:*"
      jackson:
        applies-to: version-updates
        patterns:
          - "com.fasterxml.jackson*:*"
      maven-plugins:
        applies-to: version-updates
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.codehaus.mojo:*"
          - "com.diffplug.spotless:*"
          - "org.jacoco:*"
          - "org.sonatype.central:*"

    ignore:
      - dependency-name: "org.apache.kafka:*"
        update-types: [ "version-update:semver-major" ]
      - dependency-name: "io.confluent:*"
        update-types: [ "version-update:semver-major" ]

  # ── GitHub Actions ────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Paris
    rebase-strategy: auto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "deps(ci)"
      include: "scope"
    groups:
      actions-core:
        applies-to: version-updates
        patterns: [ "actions/*" ]
